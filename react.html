<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ejercicio 3 - Personas (React)</title>
  <link rel="stylesheet" href="estilos.css" />
  <!-- React / ReactDOM desde jsDelivr -->
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.22.12/babel.min.js"></script>
</head>
<body class="page">
  <header class="site-header">
    <h1>Ejercicio 3 — Personas (React)</h1>
    <nav><a href="index.html">← Volver al índice</a></nav>
  </header>

  <main class="container">
    <div id="root" style="width:100%"></div>
  </main>

  <footer class="site-footer">Personas con React • componentes y estado</footer>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    function calcularIMC(peso, altura){
      if(!altura || altura <= 0) return '—';
      return (peso / (altura * altura)).toFixed(2);
    }

    function PersonForm({ onAdd }){
      const [form, setForm] = useState({ nombre:'', apellido:'', edad:'', altura:'', peso:'' });

      function handleChange(e){
        const { name, value } = e.target;
        setForm(prev => ({ ...prev, [name]: value }));
      }

      function handleSubmit(e){
        e.preventDefault();
        const nombre = form.nombre.trim();
        const apellido = form.apellido.trim();
        const edad = parseInt(form.edad, 10);
        const altura = parseFloat(form.altura);
        const peso = parseFloat(form.peso);

        if(!nombre || !apellido || Number.isNaN(edad) || Number.isNaN(altura) || Number.isNaN(peso) || altura <= 0 || peso <= 0){
          alert('Completa los campos correctamente.');
          return;
        }

        onAdd({ id: Date.now().toString(), nombre, apellido, edad, altura, peso });
        setForm({ nombre:'', apellido:'', edad:'', altura:'', peso:'' });
      }

      return (
        <section className="card" aria-labelledby="formTitle">
          <h2 id="formTitle">Añadir persona</h2>
          <form onSubmit={handleSubmit}>
            <div className="row">
              <input name="nombre" placeholder="Nombre" value={form.nombre} onChange={handleChange} />
              <input name="apellido" placeholder="Apellido" value={form.apellido} onChange={handleChange} />
            </div>
            <div className="row">
              <input name="edad" type="number" placeholder="Edad" min="0" value={form.edad} onChange={handleChange} />
              <input name="altura" type="number" step="0.01" placeholder="Altura (m)" min="0.1" value={form.altura} onChange={handleChange} />
              <input name="peso" type="number" step="0.1" placeholder="Peso (kg)" min="0.1" value={form.peso} onChange={handleChange} />
            </div>
            <div className="actions" style={{marginTop:8}}>
              <button type="submit" className="btn">Agregar</button>
              <button type="button" className="btn secondary" onClick={() => setForm({ nombre:'', apellido:'', edad:'', altura:'', peso:'' })} style={{marginLeft:8}}>Limpiar</button>
            </div>
          </form>
        </section>
      );
    }

    function PeopleTable({ people, onDelete }){
      return (
        <section className="card" aria-labelledby="listTitle" style={{marginTop:16}}>
          <h2 id="listTitle">Lista de personas</h2>
          <div className="table-wrap" style={{marginTop:8}}>
            <table>
              <thead>
                <tr><th>Nombre</th><th>Apellido</th><th>Edad</th><th>Altura</th><th>Peso</th><th>IMC</th><th>Acción</th></tr>
              </thead>
              <tbody>
                {people.length === 0 ? (
                  <tr><td colSpan="7" className="empty">No hay personas agregadas.</td></tr>
                ) : (
                  people.map(p => (
                    <tr key={p.id}>
                      <td>{p.nombre}</td>
                      <td>{p.apellido}</td>
                      <td>{p.edad}</td>
                      <td>{p.altura}</td>
                      <td>{p.peso}</td>
                      <td>{calcularIMC(p.peso, p.altura)}</td>
                      <td><button className="btn small" onClick={() => onDelete(p.id)}>Eliminar</button></td>
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>
        </section>
      );
    }

    function App(){
      const [people, setPeople] = useState([]);
      function addPerson(p){ setPeople(prev => [...prev, p]); }
      function deletePerson(id){ setPeople(prev => prev.filter(x => x.id !== id)); }
      return (
        <React.Fragment>
          <PersonForm onAdd={addPerson} />
          <PeopleTable people={people} onDelete={deletePerson} />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
