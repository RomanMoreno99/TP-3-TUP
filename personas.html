<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Personas - Formulario y Tabla</title>
  <link rel="stylesheet" href="estilos.css" />
</head>
<body>
  <header class="header">
    <h1>Personas</h1>
    <nav><a href="index.html"> Volver al índice</a></nav>
  </header>

  <main class="container">
    <section class="cardd">
      <h2>Añadir persona</h2>
      <form id="personForm">
        <div class="row">
          <input id="nombre" placeholder="Nombre" required />
          <input id="apellido" placeholder="Apellido" required />
        </div>
        <div class="row">
          <input id="edad" type="number" placeholder="Edad" min="0" required />
          <input id="altura" type="number" step="0.01" placeholder="Altura (m)" min="0.1" required />
          <input id="peso" type="number" step="0.1" placeholder="Peso (kg)" min="0.1" required />
        </div>
        <div class="actions">
          <button type="submit" class="btn">Agregar</button>
          <button type="button" id="clearBtn" class="btn secondary">Limpiar</button>
        </div>
      </form>
    </section>

    <section class="cardd">
      <h2>Lista de personas</h2>
      <table id="peopleTable">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Edad</th>
            <th>Altura (m)</th>
            <th>Peso (kg)</th>
            <th>IMC</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody>
          <!-- filas generadas por JS -->
        </tbody>
      </table>
    </section>
  </main>

  <footer class="footer">Ejercicio simple • HTML, CSS y JavaScript (DOM y eventos)</footer>

  <script>
    // Arreglo donde guardamos las personas
    let people = [];

    const form = document.getElementById('personForm');
    const tbody = document.querySelector('#peopleTable tbody');
    const clearBtn = document.getElementById('clearBtn');

    // Función para calcular IMC y formatearlo a 2 decimales
    function calcularIMC(peso, altura){
      if (!altura || altura <= 0) return '—';
      const imc = peso / (altura * altura);
      return imc.toFixed(2);
    }

    // Renderizar la tabla desde el arreglo people
    function renderTable(){
      tbody.innerHTML = '';
      if(people.length === 0){
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="7" class="empty">No hay personas agregadas.</td>';
        tbody.appendChild(tr);
        return;
      }
      people.forEach(person => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${person.nombre}</td>
          <td>${person.apellido}</td>
          <td>${person.edad}</td>
          <td>${person.altura}</td>
          <td>${person.peso}</td>
          <td>${calcularIMC(person.peso, person.altura)}</td>
          <td><button class="btn small delete" data-id="${person.id}">Eliminar</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Manejo del submit del formulario: agregar persona
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const nombre = document.getElementById('nombre').value.trim();
      const apellido = document.getElementById('apellido').value.trim();
      const edad = parseInt(document.getElementById('edad').value, 10);
      const altura = parseFloat(document.getElementById('altura').value);
      const peso = parseFloat(document.getElementById('peso').value);

      // Validación simple
      if(!nombre || !apellido || Number.isNaN(edad) || Number.isNaN(altura) || Number.isNaN(peso) || altura <= 0 || peso <= 0){
        alert('Completa todos los campos correctamente.');
        return;
      }

      // Crear objeto persona con id simple
      const persona = {
        id: Date.now().toString(), // id único rápido
        nombre, apellido, edad, altura, peso
      };

      people.push(persona);
      renderTable();
      form.reset();
      document.getElementById('nombre').focus();
    });

    // Delegación de eventos para eliminar fila
    tbody.addEventListener('click', (e) => {
      if(e.target && e.target.matches('.delete')){
        const id = e.target.dataset.id;
        people = people.filter(p => p.id !== id);
        renderTable();
      }
    });

    // Botón limpiar: vacía el formulario
    clearBtn.addEventListener('click', () => form.reset());

    // Render inicial
    renderTable();
  </script>
</body>
</html>
