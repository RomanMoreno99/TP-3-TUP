<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ejercicio 1 - Flexbox</title>
  <link rel="stylesheet" href="estilos.css" />
</head>
<body class="page">
  <header class="site-header">
    <h1>Ejercicio 1 — Flexbox</h1>
    <nav><a href="index.html"> Volver al índice</a></nav>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Controles</h2>
      <div class="controls">
        <button id="toggleHighlight" class="button">Alternar resaltado</button>
        <button id="sortValue" class="button secondary">Ordenar por valor</button>
        <label style="margin-left:8px">Filtrar categoría:</label>
        <select id="filterCategory" class="input">
          <option value="all">Todas</option>
        </select>
      </div>
      <p class="legend">El contenedor de tarjetas usa display:flex y flex-wrap para ajustarse.</p>
    </section>

    <section class="panel">
      <h2>Tarjetas generadas</h2>
      <div id="cardsContainer" class="cards" aria-live="polite"></div>
      <div id="emptyMessage" class="no-results" style="display:none">No hay elementos.</div>
    </section>
  </main>

  <footer class="site-footer">Se reservan derechos de autor © 2026</footer>

  <script>
    // variables y arreglo (>=6 elementos)
    let highlighted = false;
    let valueAsc = true;
    const items = [
      {id:1, title:'Alfa', category:'A', value:12},
      {id:2, title:'Beta', category:'B', value:7},
      {id:3, title:'Gamma', category:'A', value:21},
      {id:4, title:'Delta', category:'C', value:5},
      {id:5, title:'Epsilon', category:'B', value:14},
      {id:6, title:'Zeta', category:'C', value:9},
      {id:7, title:'Eta', category:'A', value:18},
      {id:8, title:'Theta', category:'B', value:3}
    ];
    let viewItems = [...items];

    const cardsContainer = document.getElementById('cardsContainer');
    const emptyMessage = document.getElementById('emptyMessage');
    const filterSelect = document.getElementById('filterCategory');

    function initFilterOptions(){
      const cats = Array.from(new Set(items.map(i => i.category))).sort();
      cats.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = 'Cat ' + cat;
        filterSelect.appendChild(opt);
      });
    }

    function renderCards(list){
      cardsContainer.innerHTML = '';
      if(!list || list.length === 0){
        emptyMessage.style.display = 'block';
        return;
      }
      emptyMessage.style.display = 'none';

      list.forEach(obj => {
        const card = document.createElement('article');
        card.className = 'card' + (highlighted ? ' highlight' : '');
        const title = document.createElement('div');
        title.className = 'title';
        title.textContent = obj.title;
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `Cat ${obj.category} • ${obj.value}`;
        const actions = document.createElement('div');
        actions.style.marginTop = 'auto';
        const btnInvert = document.createElement('button');
        btnInvert.className = 'button secondary';
        btnInvert.textContent = 'Invertir valor';
        btnInvert.addEventListener('click', () => {
          obj.value = obj.value > 0 ? -obj.value : Math.abs(obj.value);
          renderCards(viewItems);
        });
        actions.appendChild(btnInvert);
        card.appendChild(title);
        card.appendChild(meta);
        card.appendChild(actions);
        cardsContainer.appendChild(card);
      });
    }

    function sortByValue(){
      viewItems.sort((a,b) => valueAsc ? a.value - b.value : b.value - a.value);
      valueAsc = !valueAsc;
      renderCards(viewItems);
    }

    function filterByCategory(cat){
      viewItems = cat === 'all' ? [...items] : items.filter(i => i.category === cat);
      renderCards(viewItems);
    }

    function toggleHighlight(){ highlighted = !highlighted; renderCards(viewItems); }

    document.getElementById('toggleHighlight').addEventListener('click', toggleHighlight);
    document.getElementById('sortValue').addEventListener('click', sortByValue);
    filterSelect.addEventListener('change', (e) => filterByCategory(e.target.value));

    initFilterOptions();
    renderCards(viewItems);
  </script>
</body>
</html>
